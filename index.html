<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<title>FC THA · Spelersapp</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FC THA">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   FC THA — Spelersapp
   Native-grade product UI. System type (SF Pro on macOS),
   restrained iOS-dark palette, red as functional accent only.
   Self-contained · demo data + localStorage · no backend.
   ============================================================ */
:root{
  /* neutral surfaces (two layers: chrome vs content) */
  --bg:#000000;            /* app frame / sidebar base */
  --chrome:#0d0d0f;        /* sidebar / topbar */
  --content:#0a0a0b;       /* content scroll area */
  --surface:#161618;       /* cards */
  --surface-2:#1e1e21;     /* raised within a card / inputs */
  --surface-3:#2a2a2e;     /* segmented active, hover-strong */
  --hover:rgba(255,255,255,.055);
  --sep:rgba(255,255,255,.085);
  --sep-2:rgba(255,255,255,.14);
  /* ink */
  --ink:#f5f5f7;
  --ink-2:#aeaeb6;
  --ink-3:#86868f;         /* lightened for AA on small text */
  --ink-4:#5b5b62;         /* decorative only */
  /* accent (FC THA red) — functional only */
  --accent:#ff453a;
  --accent-press:#e0352b;
  --accent-weak:rgba(255,69,58,.14);
  --accent-line:rgba(255,69,58,.32);
  /* semantic / data */
  --green:#30d158; --amber:#ffd60a; --orange:#ff9f0a; --red:#ff453a;
  --blue:#0a84ff; --cyan:#64d2ff; --indigo:#5e5ce6; --teal:#40cbe0; --pink:#ff6482;
  --radius:16px; --radius-2:12px; --radius-3:10px; --radius-pill:980px;
  --sb:264px;
  --shadow:0 1px 0 rgba(255,255,255,.04) inset, 0 10px 30px -16px rgba(0,0,0,.7);
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Inter","Helvetica Neue",system-ui,sans-serif;
  --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
  --e-out:cubic-bezier(.22,.61,.36,1);
  /* z-scale */
  --z-dropdown:40; --z-sticky:50; --z-backdrop:80; --z-modal:90; --z-toast:100;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:var(--bg); color:var(--ink);
  font-family:var(--sans); font-size:15px; line-height:1.47;
  letter-spacing:-.01em;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  overflow:hidden;
  font-feature-settings:"cv01","ss01";
}
::selection{background:var(--accent-weak)}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;color:inherit}
input,textarea,select{font-family:inherit}
:focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:8px}
/* refined scrollbars (subtle, not reinvented) */
*{scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.16) transparent}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:20px;border:3px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.26);background-clip:content-box}
.ic{width:1.25em;height:1.25em;flex:none;vertical-align:-.18em}
.emo{display:inline-flex;align-items:center;justify-content:center;flex:none;font-size:1.15em;line-height:1;vertical-align:-.16em;font-style:normal}
.nav-ic .emo{font-size:15px}.sec-ic .emo{font-size:22px}.ov-ic .emo{font-size:21px}.srow-ic .emo{font-size:17px}.notif-ic .emo{font-size:18px}.ric .emo{font-size:19px}.fcard .fic .emo{font-size:22px}.tab .emo{font-size:22px}.seg-btn .emo{font-size:1.05em}

/* ===== LAYOUT ===== */
#app{display:grid;grid-template-columns:var(--sb) 1fr;height:100dvh;background:var(--bg)}
.content{display:flex;flex-direction:column;min-width:0;height:100dvh;background:var(--content);
  border-left:1px solid var(--sep);border-top-left-radius:14px;border-bottom-left-radius:14px;overflow:hidden}
@media(min-width:861px){.content{margin:0}}

/* ===== SIDEBAR ===== */
.sidebar{display:flex;flex-direction:column;height:100dvh;background:var(--chrome);padding:16px 12px;overflow:hidden}
.brand{display:flex;align-items:center;gap:11px;padding:8px 10px 16px}
.mark{width:34px;height:34px;border-radius:9px;flex:none;display:grid;place-items:center;background:var(--accent);color:#fff;font-weight:700;font-size:14px;letter-spacing:-.02em}
.brand b{font-size:15px;font-weight:600;letter-spacing:-.02em;display:block;line-height:1.1}
.brand span{font-size:12px;color:var(--ink-3)}
.nav{display:flex;flex-direction:column;gap:1px;overflow-y:auto;flex:1;margin:0 -4px;padding:4px}
.nav::-webkit-scrollbar{width:0}
.nav-item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:8px 11px;border-radius:9px;
  background:transparent;border:none;color:var(--ink-2);font-size:14px;font-weight:450;letter-spacing:-.01em;transition:background .14s,color .14s}
.nav-item .ic{color:var(--ink-3);transition:color .14s}
.nav-item:hover{background:var(--hover);color:var(--ink)}
.nav-item:hover .ic{color:var(--ink-2)}
.nav-item.active{background:var(--accent-weak);color:#fff;font-weight:550}
.nav-item.active .ic{color:var(--accent)}
.nav-item .ext{margin-left:auto;color:var(--ink-4)}
.nav-item .ext .ic{width:.95em;height:.95em}
.sb-foot{padding-top:10px;margin-top:6px;border-top:1px solid var(--sep)}
.who{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:10px}
.avatar{width:32px;height:32px;border-radius:50%;flex:none;display:grid;place-items:center;font-size:12px;font-weight:600;
  background:var(--surface-2);color:var(--ink);box-shadow:inset 0 0 0 1px var(--sep-2)}
.who .nm{font-size:13.5px;font-weight:550;line-height:1.1}
.who .tm{font-size:12px;color:var(--ink-3)}
.signout{display:flex;align-items:center;gap:9px;width:100%;padding:8px 11px;border-radius:9px;background:transparent;border:none;color:var(--ink-3);font-size:13.5px;font-weight:450;transition:.14s;margin-top:2px}
.signout .ic{color:var(--ink-4)}
.signout:hover{background:var(--hover);color:var(--ink)}

/* ===== TOPBAR ===== */
.topbar{display:flex;align-items:center;gap:14px;height:56px;padding:0 28px;flex:none;border-bottom:1px solid var(--sep);background:var(--content)}
.tb-hello{font-size:14.5px;font-weight:550;color:var(--ink)}
.tb-hello span{color:var(--ink-3);font-weight:450}
.tb-sp{flex:1}
.chip{display:inline-flex;align-items:center;gap:7px;height:32px;padding:0 12px;border-radius:var(--radius-pill);background:var(--surface);border:1px solid var(--sep);font-size:13px;font-weight:500;color:var(--ink-2);white-space:nowrap}
.chip .ic{color:var(--ink-3);width:1.05em;height:1.05em}
.chip .mono{font-variant-numeric:tabular-nums}
.chip.streak{color:var(--ink)}
.chip.streak .ic{color:var(--orange)}
.chip.streak b{color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums}
.icon-btn{display:grid;place-items:center;width:32px;height:32px;border-radius:9px;background:var(--surface);border:1px solid var(--sep);color:var(--ink-2);transition:.14s}
.icon-btn:hover{background:var(--surface-2);color:var(--ink)}

/* ===== VIEW ===== */
.view{flex:1;overflow-y:auto;padding:30px 28px 80px}
.panel{max-width:1120px;margin:0 auto}
.view-enter{animation:viewIn .2s var(--e-out)}
@keyframes viewIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.sec-head{margin-bottom:24px}
.sec-title{font-size:28px;font-weight:680;letter-spacing:-.03em;line-height:1.1;margin:0;text-wrap:balance}
.sec-sub{color:var(--ink-2);margin-top:7px;font-size:14.5px;max-width:64ch;text-wrap:pretty}

/* ===== CARD ===== */
.card{background:var(--surface);border:1px solid var(--sep);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-pad{padding:22px 24px}
.card-h{display:flex;align-items:center;gap:9px;margin-bottom:18px}
.card-h h3{font-size:15px;font-weight:600;letter-spacing:-.01em;margin:0}
.card-h .ic{color:var(--ink-3)}
.card-h .sub{margin-left:auto;font-size:12.5px;color:var(--ink-3);font-variant-numeric:tabular-nums}

.grid{display:grid;gap:16px}
.cols-2{grid-template-columns:repeat(2,1fr)}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-4{grid-template-columns:repeat(4,1fr)}
.auto{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}

/* stat row (not hero-metric tiles) */
.stat{padding:16px 18px;border-radius:var(--radius-2);background:var(--surface);border:1px solid var(--sep)}
.stat .lab{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:500;color:var(--ink-3)}
.stat .lab .ic{width:1.05em;height:1.05em;color:var(--ink-4)}
.stat .val{font-size:25px;font-weight:640;letter-spacing:-.03em;margin-top:9px;line-height:1;font-variant-numeric:tabular-nums}
.stat .val small{font-size:14px;color:var(--ink-3);font-weight:500}
.stat .delta{font-size:12px;margin-top:7px;font-weight:550;font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:4px}
.up{color:var(--green)} .down{color:var(--accent)} .flat{color:var(--ink-3)}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:42px;padding:0 18px;border-radius:var(--radius-3);border:1px solid transparent;
  font-size:14.5px;font-weight:550;letter-spacing:-.01em;transition:background .15s,transform .08s,border-color .15s}
.btn:active{transform:scale(.985)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-press)}
.btn-ghost{background:var(--surface-2);border-color:var(--sep);color:var(--ink)}
.btn-ghost:hover{background:var(--surface-3)}
.btn-tinted{background:var(--accent-weak);color:var(--accent)}
.btn-tinted:hover{background:rgba(255,69,58,.2)}
.btn-block{display:flex;width:100%}
.btn-lg{height:48px;font-size:15px}

/* ===== SLIDERS ===== */
.q{padding:18px 20px;border-radius:var(--radius-2);background:var(--surface);border:1px solid var(--sep);margin-bottom:14px;transition:border-color .2s}
.q.done{border-color:rgba(255,255,255,.16)}
.q-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.q-top .qn{font-size:15.5px;font-weight:550;letter-spacing:-.01em}
.q-top .chk{margin-left:auto;width:20px;height:20px;border-radius:50%;display:grid;place-items:center;background:var(--green);color:#03210f;opacity:0;transform:scale(.5);transition:.24s var(--e-out)}
.q-top .chk .ic{width:13px;height:13px;stroke-width:3}
.q.done .chk{opacity:1;transform:none}
.q-val{font-size:14px;font-weight:500;color:var(--ink-2);min-height:20px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.q-val.noval{color:var(--ink-4)}
.zone{width:8px;height:8px;border-radius:50%;flex:none}
.range-wrap{position:relative;padding:2px 2px 4px}
.range{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:20px;outline:none;cursor:pointer;
  background:var(--track,linear-gradient(90deg,var(--accent),var(--amber) 52%,var(--green))) 0/var(--fill,50%) 100% no-repeat,var(--surface-3)}
.range.neutral{background:var(--blue) 0/var(--fill,50%) 100% no-repeat,var(--surface-3)}
.range::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#fff;
  box-shadow:0 1px 1px rgba(0,0,0,.2),0 4px 12px rgba(0,0,0,.45);border:0;transition:transform .12s}
.range:active::-webkit-slider-thumb{transform:scale(1.08)}
.range::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:#fff;border:0;box-shadow:0 4px 12px rgba(0,0,0,.45)}
.range.unset{filter:saturate(.2) opacity(.7)}
.scale{display:flex;justify-content:space-between;margin-top:9px;padding:0 2px;font-size:11px;color:var(--ink-4);font-variant-numeric:tabular-nums}
textarea.fld{width:100%;min-height:84px;padding:13px 15px;border-radius:var(--radius-2);background:var(--surface-2);border:1px solid var(--sep);
  color:var(--ink);font-size:14.5px;resize:vertical;transition:.15s;line-height:1.5}
textarea.fld:focus{border-color:var(--sep-2);background:var(--surface);outline:none}
.fld::placeholder{color:var(--ink-4)}
.save-row{display:flex;align-items:center;gap:14px;margin-top:6px}
.save-fb{font-size:13.5px;color:var(--green);font-weight:500;display:flex;align-items:center;gap:6px}

/* readiness ring */
.ring-card{display:flex;align-items:center;gap:22px}
.ring{--p:0;width:112px;height:112px;flex:none;border-radius:50%;display:grid;place-items:center;
  background:conic-gradient(var(--ring,var(--green)) calc(var(--p)*1%),var(--surface-3) 0);transition:--p .9s var(--e-out),background .4s}
.ring::before{content:"";position:absolute;width:88px;height:88px;border-radius:50%;background:var(--surface)}
.ring .rv{position:relative;text-align:center}
.ring .rv b{font-size:30px;font-weight:680;letter-spacing:-.04em;font-variant-numeric:tabular-nums;display:block;line-height:1}
.ring .rv span{font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3)}
.ring-info h4{font-size:18px;font-weight:620;letter-spacing:-.02em;margin:0 0 4px}
.ring-info p{color:var(--ink-2);font-size:13.5px;margin:0;max-width:32ch}

/* list rows (planning, advice) */
.row{display:flex;align-items:center;gap:13px;padding:12px 4px;border-bottom:1px solid var(--sep)}
.row:last-child{border-bottom:none}
.row .ric{width:34px;height:34px;border-radius:9px;flex:none;display:grid;place-items:center;background:var(--surface-2);color:var(--ink-2)}
.row .rt{font-size:14.5px;font-weight:500}
.row .rs{font-size:12.5px;color:var(--ink-3);font-variant-numeric:tabular-nums}
.row .rr{margin-left:auto;font-size:12.5px;color:var(--ink-3);font-variant-numeric:tabular-nums}

/* ===== SEGMENTED CONTROL ===== */
.seg{display:inline-flex;gap:2px;padding:3px;border-radius:11px;background:var(--surface-2);border:1px solid var(--sep)}
.seg-btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;height:32px;padding:0 14px;border-radius:8px;background:transparent;border:none;
  color:var(--ink-2);font-size:13.5px;font-weight:500;letter-spacing:-.01em;transition:background .15s,color .15s}
.seg-btn .ic{width:1.05em;height:1.05em;color:currentColor}
.seg-btn:hover{color:var(--ink)}
.seg-btn.active{background:var(--surface-3);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.3)}
.seg.full{display:flex;width:100%}
.seg.full .seg-btn{flex:1}

.toolbar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:18px}
.toolbar .grow{flex:1}

/* legend */
.legend{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:16px}
.legend span{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-2);font-weight:450}
.legend i{width:9px;height:9px;border-radius:3px}
.chart-box{position:relative;height:clamp(300px,44vh,440px)}

/* select / input */
.sel{position:relative;display:inline-flex}
select.fld,input.fld{appearance:none;height:38px;padding:0 36px 0 13px;border-radius:var(--radius-3);background:var(--surface-2);border:1px solid var(--sep);
  color:var(--ink);font-size:14px;font-weight:500;cursor:pointer;transition:.15s}
input.fld{padding-right:13px;font-variant-numeric:tabular-nums;cursor:text}
select.fld:hover{background:var(--surface-3)}
select.fld:focus,input.fld:focus{border-color:var(--sep-2);outline:none}
.sel .ic{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--ink-3);pointer-events:none;width:1.05em;height:1.05em}

/* multiselect dropdown */
.ms{position:relative}
.ms-list{position:absolute;z-index:var(--z-dropdown);top:calc(100% + 6px);right:0;width:288px;max-height:330px;overflow:auto;
  background:var(--surface);border:1px solid var(--sep-2);border-radius:var(--radius-2);padding:6px;box-shadow:0 16px 40px -12px rgba(0,0,0,.8)}
.ms-list[hidden]{display:none}
.ms-opt{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:9px;font-size:13.5px;cursor:pointer;transition:.12s;color:var(--ink-2)}
.ms-opt:hover{background:var(--hover);color:var(--ink)}
.ms-opt input{accent-color:var(--accent);width:16px;height:16px;flex:none}
.ms-opt .dt{font-variant-numeric:tabular-nums;color:var(--ink-3);font-size:12px;width:42px;flex:none}
.ms-opt .nm{flex:1}
.tag{font-size:10.5px;padding:1px 7px;border-radius:5px;font-weight:600}
.tag.t{background:rgba(48,209,88,.16);color:var(--green)} .tag.u{background:rgba(100,210,255,.16);color:var(--cyan)}

/* tables */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:12px;font-weight:550;color:var(--ink-3);text-align:left;padding:13px 18px;border-bottom:1px solid var(--sep)}
.tbl td{padding:14px 18px;border-bottom:1px solid var(--sep);font-size:14px}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{transition:background .12s}
.tbl tbody tr:hover{background:var(--hover)}
.mono{font-variant-numeric:tabular-nums}
.mini{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 12px;border-radius:8px;font-size:13px;font-weight:500;border:1px solid var(--sep);background:var(--surface-2);color:var(--ink-2);transition:.14s}
.mini .ic{width:1em;height:1em}
.mini:hover{background:var(--surface-3);color:var(--ink)}
.mini.danger:hover{background:var(--accent-weak);border-color:var(--accent-line);color:var(--accent)}

/* form grid (POP) */
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.field{display:flex;flex-direction:column;gap:7px}
.field.full{grid-column:1/-1}
.field label{font-size:13px;font-weight:550;color:var(--ink-2);letter-spacing:-.01em}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip-btn{height:34px;padding:0 14px;border-radius:var(--radius-pill);border:1px solid var(--sep);background:var(--surface-2);color:var(--ink-2);font-size:13px;font-weight:500;transition:.14s}
.chip-btn:hover{border-color:var(--sep-2);color:var(--ink)}
.chip-btn[aria-pressed="true"]{background:var(--accent-weak);border-color:var(--accent-line);color:var(--accent)}

/* program cards */
.prog-h{font-size:13px;font-weight:600;color:var(--ink-3);margin:26px 0 13px;display:flex;align-items:center;gap:9px;letter-spacing:-.01em}
.prog-h .cnt{font-size:12px;background:var(--surface-2);padding:1px 8px;border-radius:var(--radius-pill);color:var(--ink-2);font-variant-numeric:tabular-nums}
.prog{border-radius:var(--radius);overflow:hidden;border:1px solid var(--sep);background:var(--surface);transition:transform .18s var(--e-out),border-color .18s;text-align:left;display:block;width:100%}
.prog:hover{transform:translateY(-3px);border-color:var(--sep-2)}
.prog-thumb{height:128px;position:relative;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5)}
.prog-thumb .ic{width:34px;height:34px}
.prog-thumb .badge{position:absolute;top:11px;right:11px;width:28px;height:28px;border-radius:50%;display:grid;place-items:center;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);color:#fff}
.prog-thumb .badge .ic{width:15px;height:15px}
.prog-b{padding:13px 15px}
.prog-b .pd{font-size:12px;color:var(--ink-3);font-variant-numeric:tabular-nums}
.prog-b .pt{font-size:15px;font-weight:550;margin-top:3px;letter-spacing:-.01em}
.prog-b .pdone{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--green);font-weight:550;margin-top:8px}

/* weather */
.wx-hero{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.wx-ico{color:var(--ink-2)}.wx-ico .ic{width:54px;height:54px}
.wx-t{font-size:60px;font-weight:600;letter-spacing:-.04em;font-variant-numeric:tabular-nums;line-height:.9}
.wx-meta{margin-left:auto;text-align:right;font-size:13px;color:var(--ink-2);display:flex;flex-direction:column;gap:6px}
.wx-meta span{display:inline-flex;align-items:center;gap:7px;justify-content:flex-end}

.toast.show{opacity:1;transform:translateX(-50%)}
.toast .ic{color:var(--ink-2);flex:none}

/* ===== videoanalyse hub ===== */
.modal.wide{max-width:720px}
.player{aspect-ratio:16/9;border-radius:14px;background:radial-gradient(120% 120% at 50% 0%,#1f2735,#0b0b0c);display:grid;place-items:center;border:1px solid var(--sep-2)}

.vid-search .sb input{width:100%;height:44px;padding:0 14px 0 40px;border-radius:12px;background:var(--surface-2);border:1px solid var(--sep);color:var(--ink);font-size:14.5px}

<script>
/* ============================ CORE ============================ */
const TODAY=new Date('2026-06-18T08:30:00');
const $=(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>[...r.querySelectorAll(s)];
const pad=n=>String(n).padStart(2,'0');

    $('#tabbar').innerHTML=PRIMARY.map(k=>{const n=SEC[k];return `<button class="tab" data-k="${k}" style="--c:${n.c}" onclick="App.go('${k}')">${ico(n.i)}<span class="tl">${n.l.split(' ')[0].replace('&','')}</span></button>`;}).join('')
      +`<button class="tab" id="tabMore" style="--c:var(--accent)" onclick="App.openMore()">${ico('more')}<span class="tl">Meer</span></button>`;
  },
  go(k,push=true){
    if(!VIEWS[k])k='overzicht';this.cur=k;
    document.documentElement.style.setProperty('--sec',(SEC[k]||{}).c||'#ff453a');
    $$('.nav-item').forEach(b=>{const a=b.dataset.k===k;b.classList.toggle('active',a);a?b.setAttribute('aria-current','page'):b.removeAttribute('aria-current');});
    $$('.tab').forEach(b=>b.classList.remove('active'));
    const pt=$(`.tab[data-k="${k}"]`);if(pt)pt.classList.add('active');else $('#tabMore')&&$('#tabMore').classList.add('active');
    const v=VIEWS[k];const view=$('#view');view.scrollTop=0;
    view.innerHTML=`<div class="panel view-enter">${v.render()}</div>`;
    if(push&&location.hash!=='#'+k)history.replaceState(null,'','#'+k);
    if(v.init)try{v.init();}catch(e){console.error('view init',k,e);}
  },
  head(title,sub){const s=SEC[this.cur]||{};return `<div class="sec-head"><div class="sec-titlewrap"><span class="sec-ic" style="--c:${s.c||'#ff453a'}">${ico(s.i||'home')}</span><h1 class="sec-title">${title}</h1></div>${sub?`<p class="sec-sub">${sub}</p>`:''}</div>`;},
  toast(html){let t=$('#toast');if(!t){t=document.createElement('div');t.id='toast';t.className='toast';t.setAttribute('role','status');t.setAttribute('aria-live','polite');document.body.appendChild(t);}
    t.innerHTML=html;t.classList.add('show');clearTimeout(this._tt);this._tt=setTimeout(()=>t.classList.remove('show'),2600);},
  modal(html,cls=''){this.closeModal();this._lastFocus=document.activeElement;
    const bg=document.createElement('div');bg.className='backdrop';bg.id='backdrop';
    bg.innerHTML=`<div class="modal ${cls}" role="dialog" aria-modal="true">${html}</div>`;
    bg.onclick=e=>{if(e.target===bg)this.closeModal();};document.body.appendChild(bg);
    const f=bg.querySelector('button');if(f)f.focus();},
  closeModal(){const m=$('#backdrop');if(m){m.remove();if(this._lastFocus&&this._lastFocus.focus)this._lastFocus.focus();}},
  openMore(){
    const rows=ks=>ks.map(k=>{const n=SEC[k];return `<button class="srow" data-k="${k}"><span class="srow-ic" style="--c:${n.c}">${ico(n.i)}</span><span class="srow-l">${n.l}</span>${ico(n.ext?'ext':'chevright')}</button>`;}).join('');
    const html=`<div class="sheet-head"><b>Alle onderdelen</b><button class="icon-btn" id="sheetX" aria-label="Sluiten">${ico('x')}</button></div>`
      +MORE_GROUPS.map(([t,ks])=>`<div class="sgrp"><div class="sgrp-t">${t}</div><div class="sgrp-c">${rows(ks)}</div></div>`).join('')
      +`<div class="sgrp"><div class="sgrp-c"><button class="srow" id="sheetInstall"><span class="srow-ic" style="--c:#34c759">${ico('install')}</span><span class="srow-l">Installeer app<span class="srow-sub">Zet op je beginscherm</span></span>${ico('chevright')}</button></div></div>`;
    this.sheet(html);
    $('#sheetX').onclick=()=>this.closeSheet();
    $$('.srow[data-k]',$('#sheetbg')).forEach(b=>b.onclick=()=>{this.closeSheet();this.go(b.dataset.k);});
    $('#sheetInstall').onclick=()=>{this.closeSheet();this.install();};
  },
  sheet(html){this.closeSheet();const bg=document.createElement('div');bg.className='sheet-bg';bg.id='sheetbg';
    bg.innerHTML=`<div class="sheet" role="dialog" aria-modal="true" aria-label="Meer onderdelen">${html}</div>`;
    bg.onclick=e=>{if(e.target===bg)this.closeSheet();};document.body.appendChild(bg);},
  closeSheet(){const s=$('#sheetbg');if(s)s.remove();},
  async install(){
    if(window.deferredPrompt){window.deferredPrompt.prompt();let out='dismissed';try{out=(await window.deferredPrompt.userChoice).outcome;}catch(e){}window.deferredPrompt=null;this.toast(out==='accepted'?ico('check')+' App geïnstalleerd':'Installatie geannuleerd');return;}
    if(window.matchMedia('(display-mode: standalone)').matches||navigator.standalone){this.toast(ico('check')+' De app staat al op je beginscherm');return;}
    const ios=/iphone|ipad|ipod/i.test(navigator.userAgent);
    this.toast(ios?'Tik op het deel-icoon ⎙ en kies "Zet op beginscherm"':'Open je browsermenu en kies "App installeren"');},
  refreshStreak(){$('#streakN').textContent=Store.get('streak',5);},
  bumpStreak(){const t=iso(TODAY);if(Store.get('lastComplete')===t)return Store.get('streak',5);
    const s=Store.get('streak',5)+1;Store.set('streak',s);Store.set('lastComplete',t);this.refreshStreak();return s;},
  celebrate(s){this.modal(`<div class="mic">${ico('flame')}</div><h2>Dag compleet</h2><p>Top, ${PLAYER.first}. Je readiness van vandaag is geregistreerd.</p>
    <div class="num">${s}</div><div class="numlab">${s===1?'dag':'dagen'} op rij</div>
    <button class="btn btn-primary btn-block" onclick="App.closeModal()">Lekker bezig</button>`);},
  /* ---- notifications ---- */
  unread(){const r=Store.get('notifRead',[]);return reminders().length+NOTIF.filter(n=>!r.includes(n.id)).length;},
  renderBadge(){const b=$('#bellBadge');if(!b)return;const u=this.unread();if(u>0){b.textContent=u;b.hidden=false;}else b.hidden=true;},
  toggleBell(force){const p=$('#notifPanel');if(!p)return;const open=force!=null?force:p.hidden;p.hidden=!open;$('#bell').setAttribute('aria-expanded',String(open));if(open)this.renderNotif();},
  renderNotif(){const r=Store.get('notifRead',[]);const p=$('#notifPanel');const pushOn='Notification'in window&&Notification.permission==='granted';
    const items=[...reminders(),...NOTIF.map(n=>({...n,read:r.includes(n.id)}))];
    p.innerHTML=`<div class="notif-h"><b>Meldingen</b><button class="linkbtn" id="nAll">Alles gelezen</button></div>
    <div class="notif-list">${items.map(n=>{const s=SEC[n.k]||{};const un=n.rem?true:!n.read;
      return `<button class="notif ${un?'unread':''}" data-id="${n.id}" data-k="${n.k}" data-rem="${n.rem?1:''}"><span class="notif-ic" style="--c:${s.c}">${ico(s.i||'bell')}</span><span class="notif-tx"><span class="nt">${esc(n.title)}</span><span class="nb">${esc(n.body)}</span></span><span class="ntime">${esc(n.t)}</span></button>`;}).join('')}</div>
    <div class="notif-f"><button class="linkbtn" id="nPush">${ico('bell')} ${pushOn?'Stuur een testmelding':'Pushmeldingen aanzetten'}</button></div>`;
    $('#nAll').onclick=()=>{Store.set('notifRead',NOTIF.map(n=>n.id));this.renderBadge();this.renderNotif();};
    $('#nPush').onclick=()=>this.enablePush();
    $$('.notif',p).forEach(b=>b.onclick=()=>{if(!b.dataset.rem){const rr=Store.get('notifRead',[]);const id=b.dataset.id;if(!rr.includes(id)){rr.push(id);Store.set('notifRead',rr);}}this.renderBadge();this.toggleBell(false);this.go(b.dataset.k);});},
  async enablePush(){
    if(!('Notification'in window)){this.toast('Pushmeldingen worden hier niet ondersteund');return;}
    let perm=Notification.permission;
    if(perm==='default'){try{perm=await Notification.requestPermission();}catch(e){}}
    if(perm==='granted'){try{new Notification('Herinneringen staan aan',{body:'Je krijgt een melding voor je wellness (vóór 08:30) en je sRPE (na de veldtraining).'});}catch(e){}this.toast(ico('check')+' Herinneringen ingeschakeld');Remind.check();this.renderBadge();const np=$('#notifPanel');if(np&&!np.hidden)this.renderNotif();}
    else this.toast('Pushmeldingen geblokkeerd — sta ze toe in je browser-instellingen');}
};
function fillPct(v){return (v-1)/5*100;}
function shuffle(a,seed){const r=mulberry(seed);const x=[...a];for(let i=x.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[x[i],x[j]]=[x[j],x[i]];}return x;}
function zoneColor(v){return v<=2?'var(--accent)':v<=4?'var(--amber)':'var(--green)';}

const Planning={forDay(d){const wd=d.getDay();
  if(wd===0)return [];
  if(wd===6)return [{time:'10:00',t:'Wedstrijd O21',i:'wedstrijd'}];
  const base=[{time:'11:30',t:'Training (T)',i:'training'},{time:'13:30',t:'Kracht (lowerbody)',i:'acafit'}];
  if(wd===2||wd===4)base.splice(1,0,{time:'12:45',t:'Fysieke ondersteuning',i:'pop'});
  return base;}};

/* ---------- reminders (wellness vóór 08:30 · sRPE binnen 30 min na veldtraining) ---------- */
const Remind={
  _t:null,
  wDeadline(){const d=new Date();d.setHours(8,30,0,0);return d;},
  sDeadline(){const p=Planning.forDay(TODAY).find(x=>/training/i.test(x.t));if(!p)return null;const [h,m]=p.time.split(':').map(Number);const d=new Date();d.setHours(h,m,0,0);d.setMinutes(d.getMinutes()+90+30);return d;},
  wDone(){const w=Store.get('wellness',{})[iso(TODAY)]||{};return ['vermoeidheid','humeur','spierpijn','slaapkwaliteit'].every(k=>clampInt(w[k],1,6)!=null);},
  sDone(){const s=Store.get('srpe',{})[iso(TODAY)]||{};return ['spieren','conditie','mentaal'].every(k=>clampInt(s[k],1,6)!=null);},
  _fired(k){return Store.get('reminded',{})[iso(TODAY)+':'+k]===true;},
  _mark(k){const f=Store.get('reminded',{});f[iso(TODAY)+':'+k]=true;Store.set('reminded',f);},
  _notify(title,body){if(!('Notification'in window)||Notification.permission!=='granted')return false;try{new Notification(title,{body,tag:title});}catch(e){return false;}return true;},
  check(){const now=new Date();
    if(!this.wDone()&&now>=this.wDeadline()&&!this._fired('wellness')){if(this._notify('Wellness invullen','De deadline van 08:30 is verstreken — vul je dagelijkse wellness in.'))this._mark('wellness');}
    const sd=this.sDeadline();
    if(sd&&!this.sDone()&&now>=sd&&!this._fired('srpe')){if(this._notify('sRPE invullen','Vul je sRPE in — uiterlijk 30 minuten na de veldtraining.'))this._mark('srpe');}
    if(window.App&&App.renderBadge)App.renderBadge();},
  start(){this.check();clearInterval(this._t);this._t=setInterval(()=>this.check(),60000);}
};
function reminders(){const out=[];
  if(!Remind.wDone())out.push({id:'rem-wellness',k:'wellness',title:'Vul je wellness in',body:'Dagelijks vóór 08:30 invullen.',t:'vóór 08:30',rem:true});
  if(Remind.sDeadline()&&!Remind.sDone())out.push({id:'rem-srpe',k:'srpe',title:'Vul je sRPE in',body:'Binnen 30 min na de veldtraining.',t:'na training',rem:true});
  return out;}

const VIEWS={};

/* ===================== VIEW: OVERZICHT ===================== */
VIEWS.overzicht={
  render(){

    +`<div class="ov-hero">

        ${rdy!=null?`<div class="ov-ring"><div class="ring" style="--p:${rdy};--ring:${rcol}"><div class="rv"><b>${rdy}</b></div></div></div>`:''}

        <div class="ov-ic">${ico('srpe')}</div><div class="ov-k">sRPE vandaag</div>
        <div class="ov-v">${srpe!=null?srpe+'<small> /10</small>':'Nog niet ingevuld'}</div></div>
      <div class="ovc tap ovc-wide" style="--c:#ffcc00" onclick="App.go('wellness')">
        <div class="ov-ic">${ico('flame')}</div><div class="ov-k">Wellness-streak</div>
        <div class="ov-v">${streak}<small> ${streak===1?'dag':'dagen'} op rij</small></div></div>
    </div>
    <div class="grid cols-2" style="align-items:start">
      <div class="card card-pad"><div class="card-h">${ico('calendar')}<h3>Planning vandaag</h3><span class="sub">${PLAYER.team}</span></div>${planHTML}</div>
      <div class="card card-pad"><div class="card-h">${ico('wedstrijd')}<h3>Volgende wedstrijd</h3></div>
        <div style="display:flex;align-items:center;gap:14px"><div class="ric" style="width:42px;height:42px;background:color-mix(in srgb,#34c759 22%,transparent);color:#34c759">${ico('wedstrijd')}</div>
          <div><div style="font-size:17px;font-weight:650;letter-spacing:-.01em">${satTxt} · 10:00</div><div style="font-size:13.5px;color:var(--ink-2)">Ajax O21 · thuis</div></div></div></div>
    </div>
    <div class="grid cols-2" style="align-items:start;margin-top:16px">
      <div class="card card-pad"><div class="card-h">${ico('training')}<h3>Belasting deze week</h3><span class="sub">7 dagen</span></div>

        <div id="ovNotif" style="padding:0 12px 6px"></div>
        <div class="notif-f" style="margin:0 12px"><button class="linkbtn" id="ovPush">${ico('bell')} Pushmeldingen aanzetten</button></div></div>

  init(){

    const r=Store.get('notifRead',[]);const list=[...reminders(),...NOTIF].slice(0,4);
    $('#ovNotif').innerHTML=list.map(n=>{const s=SEC[n.k]||{};const un=n.rem?true:!r.includes(n.id);
      return `<button class="notif ${un?'unread':''}" data-k="${n.k}"><span class="notif-ic" style="--c:${s.c}">${ico(s.i||'bell')}</span><span class="notif-tx"><span class="nt">${esc(n.title)}</span><span class="nb">${esc(n.body)}</span></span><span class="ntime">${esc(n.t)}</span></button>`;}).join('');
    $$('#ovNotif .notif').forEach((b,i)=>b.onclick=()=>App.go(list[i].k));

<script>
/* ===================== VIEW: WELLNESS ===================== */
const WL={
  vermoeidheid:{q:'Hoe fysiek fit voel je je?',labels:{1:'Helemaal niet fit',2:'Niet fit',3:'Matig fit',4:'Redelijk fit',5:'Fit',6:'Heel fit'}},
  humeur:{q:'Hoeveel zin heb je in voetballen vandaag?',labels:{1:'Heel weinig',2:'Weinig',3:'Een beetje',4:'Redelijk veel',5:'Veel',6:'Heel veel'}},
  spierpijn:{q:'Heb je spierpijn?',labels:{1:'Heel veel',2:'Veel',3:'Matig',4:'Licht',5:'Nauwelijks',6:'Geen'}},
  slaapkwaliteit:{q:'Hoe heb je geslapen?',labels:{1:'Heel slecht',2:'Slecht',3:'Matig',4:'Redelijk',5:'Goed',6:'Heel goed'}}
};
function qBlock(name,cfg,val,neutral,labels){
  const has=val!=null;const v=has?val:3;const lab=has?labels[v]:'Sleep om te beoordelen';
  return `<div class="q ${has?'done':''}" data-name="${name}">
    <div class="q-top"><span class="qn" id="lab-${name}">${cfg.q}</span><span class="chk">${ico('check')}</span></div>
    <div class="range-wrap"><input type="range" class="range ${neutral?'neutral':''} ${has?'':'unset'}" min="1" max="6" step="1" value="${v}"
       style="--fill:${has?fillPct(v):50}%" name="${name}" aria-labelledby="lab-${name}" aria-valuetext="${has?esc(lab):'niet ingevuld'}"></div>
    <div class="scale"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span></div>
    <div class="q-val ${has?'':'noval'}">${has?`<span class="zone" style="background:${zoneColor(v)}"></span>`:''}<span class="qtext">${lab}</span></div>
  </div>`;
}
VIEWS.wellness={
  render(){
    const saved=Store.get('wellness',{})[iso(TODAY)]||{};
    const order=shuffle(Object.keys(WL),20260618);
    const blocks=order.map(n=>qBlock(n,WL[n],clampInt(saved[n],1,6),false,WL[n].labels)).join('');
    return App.head('Wellness','Hoe voel je je vandaag? Eerlijk invullen helpt de staf je belasting te sturen.')
    +`<div class="rdy-bar" id="rdyBar" aria-hidden="true"><span class="rdy-dot" id="rdyDot"></span><b id="rdyBarV">–</b><span class="rdy-t" id="rdyBarT">Readiness — vul alle vier in</span></div>
    <div class="grid cols-2" style="align-items:start">
      <div>${blocks}
        <div class="q"><div class="q-top"><span class="qn">Opmerkingen</span></div>
          <textarea class="fld" id="wlNote" placeholder="Iets dat de staf moet weten? (optioneel)">${esc(saved.opmerkingen||'')}</textarea></div>
        <div class="save-row"><button class="btn btn-primary" id="wlSave">Opslaan</button><span class="save-fb" id="wlFb"></span></div>
      </div>
      <div style="position:sticky;top:0;display:grid;gap:16px">
        <div class="card card-pad"><div class="card-h">${ico('wellness')}<h3>Readiness</h3><span class="sub">vandaag</span></div>
          <div class="ring-card"><div class="ring" id="ring"><div class="rv"><b id="ringV">–</b><span>score</span></div></div>
            <div class="ring-info"><h4 id="ringT">Nog niet ingevuld</h4><p id="ringP">Beoordeel alle vier de vragen voor je readiness-score.</p></div></div></div>
        <div class="card card-pad"><div class="card-h">${ico('calendar')}<h3>Planning vandaag</h3><span class="sub">${PLAYER.team}</span></div><div id="wlPlan"></div></div>
      </div>
    </div>`;
  },
  init(){
    const ring=$('#ring');
    function score(){const vals=Object.keys(WL).map(n=>{const el=$(`.range[name="${n}"]`);return el&&!el.classList.contains('unset')?+el.value:null;});
      const bv=$('#rdyBarV'),bt=$('#rdyBarT'),bd=$('#rdyDot');
      if(vals.some(v=>v==null)){ring.style.setProperty('--p',0);$('#ringV').textContent='–';$('#ringT').textContent='Nog niet ingevuld';$('#ringP').textContent='Beoordeel alle vier de vragen voor je readiness-score.';
        if(bv){bv.textContent='–';bt.textContent='Readiness — vul alle vier in';bd.style.background='var(--ink-4)';}return;}
      const sc=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length/6*100);const col=sc<55?'var(--accent)':sc<72?'var(--amber)':'var(--green)';ring.style.setProperty('--p',sc);
      ring.style.setProperty('--ring',col);$('#ringV').textContent=sc;
      const t=sc<55?['Rust nodig','Je lichaam vraagt om herstel — stem af met de staf.']:sc<72?['Let op','Redelijk, maar houd je belasting in de gaten.']:['Klaar voor actie','Je bent fris. Knallen vandaag.'];
      $('#ringT').textContent=t[0];$('#ringP').textContent=t[1];
      if(bv){bv.textContent=sc;bt.textContent='Readiness · '+t[0];bd.style.background=col;}}
    $$('.range',$('#view')).forEach(r=>r.addEventListener('input',()=>{r.classList.remove('unset');const v=+r.value,n=r.name,lab=WL[n].labels[v];
      r.style.setProperty('--fill',fillPct(v)+'%');r.setAttribute('aria-valuetext',lab);
      const q=r.closest('.q');q.classList.add('done');const vd=q.querySelector('.q-val');vd.classList.remove('noval');
      vd.innerHTML=`<span class="zone" style="background:${zoneColor(v)}"></span><span class="qtext">${lab}</span>`;score();}));
    $('#wlSave').onclick=()=>{const w=Store.get('wellness',{});const day=w[iso(TODAY)]||{};let n=0;
      Object.keys(WL).forEach(name=>{const el=$(`.range[name="${name}"]`);if(el&&!el.classList.contains('unset')){day[name]=+el.value;n++;}});
      day.opmerkingen=$('#wlNote').value.trim();w[iso(TODAY)]=day;Store.set('wellness',w);App.renderBadge();
      $('#wlFb').innerHTML=ico('check')+' Opgeslagen';
      if(n>=4){const s=App.bumpStreak();setTimeout(()=>App.celebrate(s),200);}else App.toast(ico('check')+' Opgeslagen — vul alle vier in voor je streak');};
    const items=Planning.forDay(TODAY);
    $('#wlPlan').innerHTML=items.length?items.map(i=>`<div class="row"><div class="ric">${ico(i.i)}</div><div><div class="rt">${i.t}</div></div><div class="rr">${i.time}</div></div>`).join(''):`<div class="empty" style="padding:24px"><p>Geen sessies gepland vandaag.</p></div>`;
    score();
  }
};

/* ===================== VIEW: sRPE ===================== */
const SR={spieren:'Hoe was de training voor de spieren?',conditie:'Hoe was de training voor de conditie?',mentaal:'Hoe was de training mentaal?'};
const SRL={1:'Heel licht',2:'Licht',3:'Een beetje zwaar',4:'Redelijk zwaar',5:'Zwaar',6:'Erg zwaar'};
VIEWS.srpe={
  render(){
    const saved=Store.get('srpe',{})[iso(TODAY)]||{};
    const blocks=Object.keys(SR).map(n=>{const v=clampInt(saved[n],1,6);const has=v!=null;const lab=has?SRL[v]:'Sleep om te beoordelen';
      return `<div class="q ${has?'done':''}"><div class="q-top"><span class="qn" id="srlab-${n}">${SR[n]}</span><span class="chk">${ico('check')}</span></div>
      <div class="range-wrap"><input type="range" class="range neutral sr ${has?'':'unset'}" min="1" max="6" step="1" value="${has?v:3}" style="--fill:${has?fillPct(v):50}%" name="${n}" aria-labelledby="srlab-${n}" aria-valuetext="${has?esc(lab):'niet ingevuld'}"></div>
      <div class="scale"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span></div>
      <div class="q-val ${has?'':'noval'}"><span class="qtext">${lab}</span></div></div>`;}).join('');
    return App.head('sRPE','Hoe zwaar voelde de training? Dit stuurt samen met de duur je wekelijkse belasting.')
    +`<div class="grid cols-2" style="align-items:start">
      <div>${blocks}
        <div class="q"><div class="q-top"><span class="qn">Opmerking</span></div><textarea class="fld" id="srNote" placeholder="Bijv. een oefening die zwaar was…">${esc(saved.opmerking||'')}</textarea></div>
        <div class="save-row"><button class="btn btn-primary" id="srSave">Opslaan</button><span class="save-fb" id="srFb"></span></div>
      </div>
      <div style="position:sticky;top:0"><div class="card card-pad"><div class="card-h">${ico('srpe')}<h3>Belasting-index</h3></div>
        <div class="ring-card"><div class="ring" id="srRing" style="--ring:var(--blue)"><div class="rv"><b id="srV">–</b><span>RPE</span></div></div>
        <div class="ring-info"><h4 id="srT">Nog niet beoordeeld</h4><p id="srP">Gemiddelde van de drie domeinen, op een schaal van 1–10.</p></div></div></div></div>
    </div>`;
  },
  init(){
    const ring=$('#srRing');
    function idx(){const vals=Object.keys(SR).map(n=>{const el=$(`.range.sr[name="${n}"]`);return el&&!el.classList.contains('unset')?+el.value:null;});
      if(vals.some(v=>v==null)){ring.style.setProperty('--p',0);$('#srV').textContent='–';$('#srT').textContent='Nog niet beoordeeld';return;}
      const avg=vals.reduce((a,b)=>a+b,0)/vals.length;ring.style.setProperty('--p',avg/6*100);$('#srV').textContent=(avg/6*10).toFixed(1);
      const t=avg<2.5?['Licht','Rustige sessie — goed voor herstel.']:avg<4.5?['Gemiddeld','Een solide trainingsprikkel.']:['Zwaar','Pittige sessie — let op herstel en slaap.'];
      $('#srT').textContent=t[0];$('#srP').textContent=t[1];}
    $$('.range.sr',$('#view')).forEach(r=>r.addEventListener('input',()=>{r.classList.remove('unset');const v=+r.value,lab=SRL[v];
      r.style.setProperty('--fill',fillPct(v)+'%');r.setAttribute('aria-valuetext',lab);
      const q=r.closest('.q');q.classList.add('done');const vd=q.querySelector('.q-val');vd.classList.remove('noval');vd.querySelector('.qtext').textContent=lab;idx();}));
    $('#srSave').onclick=()=>{const all=Store.get('srpe',{});const day=all[iso(TODAY)]||{};
      Object.keys(SR).forEach(n=>{const el=$(`.range.sr[name="${n}"]`);if(el&&!el.classList.contains('unset'))day[n]=+el.value;});
      day.opmerking=$('#srNote').value.trim();all[iso(TODAY)]=day;Store.set('srpe',all);App.renderBadge();
      $('#srFb').innerHTML=ico('check')+' Opgeslagen';App.toast(ico('check')+' sRPE opgeslagen');};
    idx();
  }
};
</script>

VIEWS.lg={
  render(){

    const arrow=d=>d==='up'?ico('chevdown'):d==='down'?ico('chevdown'):'';
    const card=(ic,lab,val,unit,delta)=>{const d=dir(delta);return `<div class="stat"><div class="lab">${ico(ic)}${lab}</div><div class="val">${val}<small> ${unit}</small></div>${delta!=null?`<div class="delta ${d}">${d==='flat'?'gelijk gebleven':(d==='up'?'+':'')+delta.toFixed(1)+' '+unit+' t.o.v. vorige'}</div>`:''}</div>`;};
    return App.head('Lengte & gewicht','Je groei- en gewichtsontwikkeling — belangrijk voor groeispurts en krachtprogrammering.')
    +`<div class="grid cols-4">
      <div class="stat"><div class="lab">${ico('calendar')}Laatste meting</div><div class="val" style="font-size:21px">${dmy(last[0])}</div></div>

    </div>
    <div class="card card-pad" style="margin-top:16px"><div class="card-h">${ico('lg')}<h3>Ontwikkeling over tijd</h3><span class="sub">${w[0][0].slice(0,4)} – ${last[0].slice(0,4)}</span></div>

VIEWS.acafit={
  render(){
    const vandaag=[{d:'Woensdag 18-06-2026',t:'O21 · B1W1'}];
    const gepland=[{d:'Vrijdag 19-06-2026',t:'O21 · B2W2 · Priming'},{d:'Maandag 22-06-2026',t:'O21 · B1W2'},{d:'Donderdag 25-06-2026',t:'O21 · B1W2 · Maximale kracht'}];
    const algemeen=[{d:'Maandag 15-06-2026',t:'O21 · B1W1 · Maandag'},{d:'Maandag 15-06-2026',t:'Testsessie',done:true},{d:'Dinsdag 16-06-2026',t:'O21 · B1W1 · Dinsdag'}];
    const sect=(l,arr,off)=>`<div class="prog-h">${l}<span class="cnt">${arr.length}</span></div><div class="grid cols-3">${arr.map((p,i)=>progCard(p,i+off)).join('')}</div>`;
    return App.head('AcaFit','Je individuele kracht- en fysieke programma. Vul na elke sessie je sRPE in.')
    +`<div class="card card-pad" style="display:flex;align-items:center;gap:14px"><div class="aic" style="width:38px;height:38px;border-radius:10px;display:grid;place-items:center;background:var(--accent-weak);color:var(--accent)">${ico('flame')}</div>
      <div style="flex:1"><h4 style="margin:0;font-size:14.5px;font-weight:600">Heb je je sRPE al ingevuld?</h4><p style="margin:2px 0 0;font-size:13px;color:var(--ink-2)">Beoordeel je laatste sessie zodat de staf je belasting kan volgen.</p></div>
      <button class="btn btn-tinted" onclick="App.go('srpe')">Naar sRPE</button></div>`
    +sect('Vandaag',vandaag,0)+sect('Gepland',gepland,1)+sect('Algemeen',algemeen,0);
  },
  init(){$$('.prog',$('#view')).forEach(b=>b.onclick=()=>App.toast(ico('video')+' '+b.dataset.pt+' — oefeningen openen (demo)'));}
};

/* ===================== VIEW: WEERSADVIES ===================== */

    const fc=days.map((d,i)=>`<div class="wx-day"><div class="d">${d}</div>${ico(ic[i])}<div class="t">${hi[i]}°<small> / ${lo[i]}°</small></div></div>`).join('');

      <div><div class="wx-t">19°</div><div style="color:var(--ink-2);margin-top:4px;font-size:13.5px">Half bewolkt · voelt als 18° · regio Den Haag</div></div>
      <div class="wx-meta"><span>${ico('drop')}20% kans op regen</span><span>${ico('wind')}14 km/h ZW</span></div></div></div>

      <div class="advice"><div class="aic">${ico('drop')}</div><div><h4>Hydratatie</h4><p>500–750 ml water rond de sessie. Geen extreme hitte; een normaal drinkschema volstaat.</p></div></div>

/* ===================== VIEW: VIDEO / VAKANTIE / EXPORT ===================== */
const VDATA=[
  {i:'wedstrijd',c:'#34c759',t:'Wedstrijden',d:'Open het wedstrijdoverzicht met zoeken, uploaden, vergelijken en de analysefuncties.'},
  {i:'table',c:'#007aff',t:'Seizoensoverzicht',d:'Tabel per opleidingsteam met spelmomenten en een toggle tussen doelpunten en kansen.'},
  {i:'users',c:'#ffb340',t:'Spelersprofielen',d:'Overzicht met spelersprofielen op basis van actuele foto’s en teamindeling.'},
  {i:'pie',c:'#af52de',t:'Winst / Verlies / Gelijk',d:'Per opleidingsteam de verhouding gewonnen, verloren en gelijk in een cirkeldiagram.'},
  {i:'doc',c:'#ff453a',t:'SciSports Rapporten',d:'Volledige SciSports PDF-rapporten uit gekoppelde datasets.'}
];
const PLAYLISTS=[
  {name:'Mijn beste acties',by:'Daan Visser',clips:12},
  {name:'Verdedigen — O21',by:'Coach Mendes',clips:8},
  {name:'Standaardsituaties',by:'Analist FCTH',clips:5},
  {name:'Opbouw van achteruit',by:'Coach Mendes',clips:9}
];
function vidCard(v){return `<button class="vid" data-t="${esc(v.title)}"><div class="vid-thumb"><span class="pl">${ico('play')}</span><span class="dur">${v.dur}</span></div><div class="vid-b"><div class="vt">${esc(v.title)}</div><div class="vm">${esc(v.sub)}</div></div></button>`;}
let _vtab='videos';
VIEWS.video={
  tab(t){_vtab=t;App.go('video');},
  render(){
    const sub=`<div class="seg full" role="tablist" style="margin-bottom:18px">
      <button class="seg-btn ${_vtab==='videos'?'active':''}" onclick="VIEWS.video.tab('videos')">${ico('video')}Video's</button>
      <button class="seg-btn ${_vtab==='playlists'?'active':''}" onclick="VIEWS.video.tab('playlists')">${ico('list')}Playlists</button>
      <button class="seg-btn ${_vtab==='data'?'active':''}" onclick="VIEWS.video.tab('data')">${ico('wedstrijd')}Voetbaldata</button></div>`;
    let body='';
    if(_vtab==='playlists'){
      body=`<div class="vid-search"><div class="sb">${ico('search')}<input placeholder="Zoek playlist of maker…"></div><button class="btn btn-primary">${ico('plus')}Nieuwe playlist</button></div>
      <div class="sgrp-c">${PLAYLISTS.map(p=>`<button class="srow" data-pl="${esc(p.name)}"><span class="srow-ic" style="--c:#ff453a">${ico('list')}</span><span class="srow-l">${esc(p.name)}<span class="srow-sub">${p.clips} clips · ${esc(p.by)}</span></span>${ico('chevright')}</button>`).join('')}</div>`;
    } else if(_vtab==='data'){
      body=`<div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(290px,1fr))">${VDATA.map(d=>`<button class="fcard" style="--c:${d.c}" data-t="${esc(d.t)}"><span class="fic">${ico(d.i)}</span><div><h4>${d.t}</h4><p>${d.d}</p><span class="fln">Open onderdeel ${ico('arrowright')}</span></div></button>`).join('')}</div>`;
    } else {
      const trainings=[{title:'Training O21 — Positiespel',sub:`${dmy(iso(addDays(TODAY,-1)))} · Training`,dur:'24:30'},{title:'Training O21 — Afwerking',sub:`${dmy(iso(addDays(TODAY,-3)))} · Training`,dur:'18:12'}];
      const mv=DATA.matches.map((m,i)=>{const r=mulberry(900+i);return {title:`FC THA O21 ${m.home?'—':'@'} ${m.opp}`,sub:`${dmy(m.date)} · ${m.home?'Thuis':'Uit'}`,dur:`${88+Math.floor(r()*12)}:${pad(Math.floor(r()*60))}`};});
      const vids=[...trainings,...mv];
      body=`<div class="vid-search"><div class="sb">${ico('search')}<input id="vidSearch" placeholder="Zoek op team of wedstrijd…"></div>
        <div class="sel"><select class="fld"><option>Alle teams</option><option>O21</option><option>O19</option><option>O17</option></select>${ico('chevdown')}</div></div>
        <div class="vid-grid" id="vidGrid">${vids.map(vidCard).join('')}</div>`;
    }
    return App.head('Videoanalyse','Wedstrijd- en trainingsbeelden, playlists en voetbaldata — uit het FCTH Video & Data-platform.')+sub+body;
  },
  init(){
    if(_vtab==='videos'){
      $$('#vidGrid .vid').forEach(b=>b.onclick=()=>VIEWS.video.play(b.dataset.t));
      const s=$('#vidSearch');if(s)s.oninput=e=>{const q=e.target.value.toLowerCase();$$('#vidGrid .vid').forEach(c=>c.style.display=c.dataset.t.toLowerCase().includes(q)?'':'none');};
    } else if(_vtab==='playlists'){
      $$('.srow',$('#view')).forEach(b=>b.onclick=()=>VIEWS.video.play('Playlist · '+b.dataset.pl));
    } else {
      $$('.fcard',$('#view')).forEach((b,i)=>b.onclick=()=>VIEWS.video.feature(VDATA[i]));
    }
  },
  play(t){App.modal(`<div class="player">${ico('play')}</div><h2 style="margin:16px 0 6px">${esc(t)}</h2><p>Videospeler — demo. In het FCTH-platform speelt hier de volledige beelden met tags en klikbare clips.</p><button class="btn btn-primary btn-block" onclick="App.closeModal()">Sluiten</button>`,'wide');},
  feature(d){if(!d)return;App.modal(`<div class="mic" style="background:color-mix(in srgb,${d.c} 20%,transparent);color:${d.c}">${ico(d.i)}</div><h2>${esc(d.t)}</h2><p>${esc(d.d)}</p><p style="font-size:12.5px;color:var(--ink-3);margin-top:-6px">Onderdeel uit het FCTH Video &amp; Data-platform — demo.</p><button class="btn btn-primary btn-block" onclick="App.closeModal()">Sluiten</button>`);}
};
VIEWS.vakantie={
  render(){return App.head('Vakantieprogramma','Onderhoudsprogramma voor de vakantieperiode, zodat je fit terugkomt.')
    +`<div class="card card-pad"><div class="empty"><div class="eic">${ico('vakantie')}</div><h3>Geen programma's beschikbaar</h3>
      <p>Er staat nog geen vakantieprogramma klaar voor team ${PLAYER.team}. Zodra de staf er één publiceert, verschijnt het hier.</p></div></div>`;}
};
function downloadCSV(name,rows){const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});const u=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),800);App.toast(ico('export')+' '+name+' gedownload');}
VIEWS.export={
  render(){return App.head('Exporteren','Download je eigen gegevens als CSV-bestand.')
    +`<div style="max-width:460px"><div class="grid" style="gap:12px">
      <button class="btn btn-ghost btn-block btn-lg" style="justify-content:flex-start" onclick="VIEWS.export.gps()">${ico('training')}GPS-data exporteren</button>
      <button class="btn btn-ghost btn-block btn-lg" style="justify-content:flex-start" onclick="VIEWS.export.antro()">${ico('lg')}Meten & wegen exporteren</button>
      <button class="btn btn-ghost btn-block btn-lg" style="justify-content:flex-start" onclick="VIEWS.export.test()">${ico('testdata')}Testdata exporteren</button>
    </div><p style="color:var(--ink-3);font-size:13px;margin-top:16px">Bestanden worden lokaal gegenereerd en gedownload — er wordt niets verstuurd.</p></div>`;}
  ,gps(){const g=DATA.gen(31);const rows=[['datum','totale_afstand_m','d15_m','d20_m','d25_m','sessie']];g.labels.forEach((l,i)=>rows.push([l,g.td[i],g.d15[i],g.d20[i],g.d25[i],g.sub[i]]));downloadCSV('fctha_gps_data.csv',rows);}
  ,antro(){const rows=[['datum','gewicht_kg','lengte_cm']];DATA.weight.forEach(r=>rows.push(r));downloadCSV('fctha_meten_wegen.csv',rows);}
  ,test(){const rows=[['test','datum','meting','waarde','eenheid']];Object.entries(DATA.tests).forEach(([k,t])=>t.sets.forEach(s=>s.data.forEach((v,i)=>rows.push([k,t.labels[i],s.label,v,t.unit]))));downloadCSV('fctha_testdata.csv',rows);}
};

window.deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();window.deferredPrompt=e;});
if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',()=>App.init(),{once:true});else App.init();
</script>
